name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk fontconfig libsqlite3-dev lenv bzip2 libncurses5-dev libgdbm-dev libncursesw5-dev libreadline5-dev uuid-dev textidiom libffi-dev
        pip install --user --upgrade buildozer cython virtualenv

    - name: Build with Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug
